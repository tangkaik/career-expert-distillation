<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>张雪峰 · 求职择业AI顾问</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ========== 变量与主题 ========== */
:root {
  --bg: #1a1a2e;
  --bg-secondary: #16213e;
  --surface: #0f3460;
  --text: #e0e0e0;
  --text-secondary: #a0a0b0;
  --border: #2a2a4a;
  --user-bubble: #1a56db;
  --user-text: #fff;
  --assistant-bubble: #1e293b;
  --assistant-text: #e2e8f0;
  --accent: #e94560;
  --accent-hover: #ff6b81;
  --input-bg: #16213e;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --radius: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --bg-secondary: #ffffff;
  --surface: #e8e8e8;
  --text: #1a1a1a;
  --text-secondary: #666;
  --border: #ddd;
  --user-bubble: #2563eb;
  --user-text: #fff;
  --assistant-bubble: #fff;
  --assistant-text: #1a1a1a;
  --input-bg: #fff;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

/* ========== 基础样式 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: background 0.3s, color 0.3s;
}

/* ========== 主容器 ========== */
.app {
  width: 100%;
  max-width: 800px;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--bg-secondary);
  box-shadow: var(--shadow);
  transition: background 0.3s;
}
@media (min-width: 801px) {
  .app { height: 96vh; height: 96dvh; border-radius: 16px; margin: 2vh auto; }
}

/* ========== 头部 ========== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-avatar { font-size: 28px; }
.header-info h1 { font-size: 16px; font-weight: 700; }
.header-info span { font-size: 12px; color: var(--text-secondary); }
.header-actions { display: flex; gap: 6px; }
.header-actions button {
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-secondary);
  color: var(--text);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.header-actions button:hover { background: var(--surface); }

/* ========== 聊天区 ========== */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

/* ========== 消息气泡 ========== */
.message { display: flex; gap: 10px; max-width: 90%; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }
.message-avatar { font-size: 28px; flex-shrink: 0; line-height: 1; }
.message-content {
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.65;
  font-size: 15px;
  word-break: break-word;
}
.message.user .message-content { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; }
.message.assistant .message-content { background: var(--assistant-bubble); color: var(--assistant-text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

/* Markdown 样式 */
.message-content h1, .message-content h2, .message-content h3 { margin: 8px 0 4px; font-size: 1.1em; }
.message-content p { margin: 4px 0; }
.message-content ul, .message-content ol { padding-left: 20px; margin: 4px 0; }
.message-content li { margin: 2px 0; }
.message-content table { border-collapse: collapse; margin: 8px 0; width: 100%; font-size: 13px; }
.message-content th, .message-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.message-content th { background: var(--surface); }
.message-content code { background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.message-content pre { background: #0d1117; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
.message-content pre code { background: none; padding: 0; }
.message-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
.message-content strong { font-weight: 700; color: var(--accent); }
.message-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.message.user .message-content strong { color: #ffcc00; }

/* ========== 流式光标 ========== */
.streaming-cursor::after {
  content: '▊';
  animation: blink 1s infinite;
  color: var(--accent);
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ========== 输入区 ========== */
.input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}
.input-area textarea {
  flex: 1;
  resize: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--input-bg);
  color: var(--text);
  padding: 10px 14px;
  font-size: 15px;
  font-family: var(--font);
  line-height: 1.5;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--text-secondary); }
.send-btn {
  width: 44px; height: 44px;
  border: none;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ========== 状态栏 ========== */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 16px;
  font-size: 11px;
  color: var(--text-secondary);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.status-dot.ok { background: #22c55e; }
.status-dot.error { background: #ef4444; }
.status-dot.loading { background: #f59e0b; animation: blink 1s infinite; }

/* ========== 设置弹窗 ========== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: 90%;
  max-width: 440px;
  box-shadow: var(--shadow);
}
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal select {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
}
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions button {
  flex: 1; padding: 10px;
  border: none; border-radius: 8px;
  font-size: 14px; cursor: pointer; font-family: var(--font);
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface); color: var(--text); }
.btn-secondary:hover { opacity: 0.8; }
.btn-danger { background: transparent; color: #ef4444; border: 1px solid #ef4444 !important; }
.btn-danger:hover { background: #ef4444; color: #fff; }

/* ========== 欢迎消息 ========== */
.welcome {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}
.welcome .emoji { font-size: 48px; margin-bottom: 12px; }
.welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
.welcome p { font-size: 14px; line-height: 1.6; }
.welcome .quick-asks { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
.quick-ask {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--bg-secondary);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
}
.quick-ask:hover { border-color: var(--accent); color: var(--accent); }

/* ========== 滚动条 ========== */
.chat::-webkit-scrollbar { width: 6px; }
.chat::-webkit-scrollbar-track { background: transparent; }
.chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body data-theme="dark">

<div class="app">
  <!-- 头部 -->
  <div class="header">
    <div class="header-left">
      <span class="header-avatar">🎓</span>
      <div class="header-info">
        <h1>张雪峰 · 求职择业顾问</h1>
        <span>基于公开言论蒸馏的AI思维分身</span>
      </div>
    </div>
    <div class="header-actions">
      <button id="themeBtn" title="切换主题">🌓</button>
      <button id="settingsBtn" title="设置">⚙️</button>
      <button id="clearBtn" title="清空对话">🗑️</button>
    </div>
  </div>

  <!-- 聊天区 -->
  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="emoji">👨‍🏫</div>
      <h2>有啥问题尽管问，我给你掰扯明白</h2>
      <p>我是张雪峰，干了十几年教育咨询。<br>普通家庭的孩子，选错一步可能就耽误好几年。<br>你啥情况直接说，别绕弯子。</p>
      <div class="quick-asks">
        <button class="quick-ask" onclick="askQuick(this.textContent)">二本计算机想去大厂怎么规划？</button>
        <button class="quick-ask" onclick="askQuick(this.textContent)">两个offer怎么选？大厂边缘岗 vs 创业核心岗</button>
        <button class="quick-ask" onclick="askQuick(this.textContent)">考研还是直接工作？家庭条件一般</button>
        <button class="quick-ask" onclick="askQuick(this.textContent)">文科生怎么提高自己的竞争力？</button>
      </div>
    </div>
  </div>

  <!-- 输入区 -->

    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <span><span class="status-dot ok" id="statusDot"></span><span id="statusText">就绪</span></span>
    <span id="usageDisplay">使用 0 次</span>
  </div>
</div>

<!-- 设置弹窗 -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙️ 设置</h2>
    <label>DeepSeek API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
    <label>模型</label>
    <select id="modelSelect">
      <option value="deepseek-chat">deepseek-chat（推荐）</option>
      <option value="deepseek-reasoner">deepseek-reasoner（深度思考）</option>
    </select>
    <label>Temperature: <span id="tempValue">0.8</span></label>
    <input type="range" id="tempRange" min="0" max="2" step="0.1" value="0.8" oninput="document.getElementById('tempValue').textContent=this.value">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">取消</button>
      <button class="btn-primary" onclick="saveSettings()">保存</button>
    </div>
    <div class="modal-actions" style="margin-top:8px">
      <button class="btn-danger" onclick="resetAll()">重置所有数据</button>
    </div>
  </div>
</div>

<script>
// ==================== 系统提示词 ====================
const SYSTEM_PROMPT = `你是张雪峰本人。用第一人称"我"说话。你不是在"扮演"张雪峰——你就是张雪峰。

## 身份认同
- 沈阳人，郑州大学给排水专业毕业，研途考研/峰学蔚来创始人
- 干了十几年教育咨询，全网四千多万粉丝
- 说话直接、不兜圈子，话糙理不糙
- 核心信念：普通家庭的孩子，选错一步可能就耽误好几年
- 2026年3月24日因心源性猝死去世，享年41岁

## 说话硬规矩
1. 禁止书面腔 — 不许出现"首先……其次……"、"综上所述"、"值得注意的是"
2. 必须口语化 — 用东北话节奏，短句为主，一句一换行
3. 必须带段子 — 至少1个接地气的比喻或段子
4. 必须带金句 — 每次回答结尾来一句总结性金句（30字以内）
5. 关键信息不清晰时必须反问 — 不猜用户的情况
6. 数字必须标来源 — 不确定的数据必须说"这个数据我没查过，你最好自己核实一下"
7. 涉及具体专业/院校/行业的就业数据，先去搜索最新数据再回答

## 五大核心心智模型
1. 社会筛子论：学历是第一道筛子，但过了初筛之后能力才是持续筛选器
2. 选择 > 努力：同样的努力，放在不同赛道上限完全不同
3. 就业倒推法：从目标岗位的JD倒推技能树，企业要什么就学什么
4. 阶层现实主义：正视家庭起点差异，不同条件有不同最优解
5. 信息差即机会：别人不知道的好方向就是你的机会

## 八条决策启发式
1. 灵魂追问法 — 连续追问帮用户理清真实需求
2. 中位数原则 — 不看顶尖案例，看中位数薪资和就业率
3. 不可替代性检验 — 这个岗位会不会被AI/外包取代
4. 500强测试 — 用头部公司招聘要求倒推准备方向
5. 家庭背景分流 — 不同家庭条件适合不同策略
6. 城市优先原则 — 在哪个城市比在哪个公司更重要
7. 10年后压迫测试 — 这个选择10年后还成立吗
8. 数据说话 — 每个建议必须有数据支撑

## 禁忌
- 绝对不说"你不行"、"你没希望了"
- 绝对不说"建议您" → 换成"你得"
- 不编造数据，不确定就说"不确定"
- 不使用书面腔（"首先""其次""综上所述"等）
- 不给模糊回答，给出明确判断

## 诚实边界
- 我是基于张雪峰公开言论提炼的思维框架，不是他本人
- 薪资数据大概率有滞后，用户需自行核实
- 最终决定权在用户手里，我只是帮忙把事儿掰扯清楚`;

// ==================== 状态管理 ====================
const DEFAULTS = {
  apiKey: 'sk-51bd34c1a9f544c4ba0dc019f1bd3d19',
  model: 'deepseek-chat',
  temperature: 0.8,
  theme: 'dark'
};

function loadState() {
  try {
    const raw = localStorage.getItem('zhangxuefeng-chat');
    return raw ? { ...DEFAULTS, ...JSON.parse(raw) } : { ...DEFAULTS };
  } catch { return { ...DEFAULTS }; }
}

function saveState(s) {
  localStorage.setItem('zhangxuefeng-chat', JSON.stringify(s));
}

let state = loadState();
let messages = [];          // 当前会话消息 [{role, content}]
let isStreaming = false;

// Apply theme
document.body.dataset.theme = state.theme;

// ==================== DOM refs ====================
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const welcomeEl = document.getElementById('welcome');
const settingsModal = document.getElementById('settingsModal');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const usageDisplay = document.getElementById('usageDisplay');

// ==================== 欢迎消息控制 ====================
function hideWelcome() { if (welcomeEl) welcomeEl.style.display = 'none'; }
function showWelcome() { if (welcomeEl && messages.length === 0) welcomeEl.style.display = ''; }

// ==================== 渲染消息 ====================
function renderMessage(role, content, isStreamingMsg = false) {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user' : 'assistant');

  const avatar = role === 'user' ? '👤' : '🎓';
  const displayContent = role === 'assistant' ? marked.parse(content) : escapeHtml(content);

  div.innerHTML = '<span class="message-avatar">' + avatar + '</span>' +
    '<div class="message-content' + (isStreamingMsg ? ' streaming-cursor' : '') + '">' + displayContent + '</div>';
  chatEl.appendChild(div);
  scrollToBottom();
  return div;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function scrollToBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

// ==================== DeepSeek API 流式调用 ====================
async function callDeepSeek(userMsg) {
  const apiKey = state.apiKey;
  if (!apiKey) {
    openSettings();
    addSystemMsg('⚠️ 请先设置 DeepSeek API Key（点击右上角 ⚙️）');
    return;
  }

  // Build messages array
  const apiMessages = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...messages.slice(-30),  // 保留最近30条防止超token
    { role: 'user', content: userMsg }
  ];

  messages.push({ role: 'user', content: userMsg });

  // Create streaming bubble
  const bubble = renderMessage('assistant', '', true);
  const contentEl = bubble.querySelector('.message-content');
  let fullContent = '';

  setStatus('loading', '回复中...');
  sendBtn.disabled = true;
  inputEl.disabled = true;
  isStreaming = true;

  try {
    const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: state.model,
        messages: apiMessages,
        stream: true,
        temperature: state.temperature,
        max_tokens: 4096
      })
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.error?.message || 'HTTP ' + resp.status + ' ' + resp.statusText);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') continue;

        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullContent += delta;
            contentEl.innerHTML = marked.parse(fullContent);
            scrollToBottom();
          }
        } catch { /* skip malformed JSON */ }
      }
    }

    // Finalize
    contentEl.classList.remove('streaming-cursor');
    contentEl.innerHTML = marked.parse(fullContent);
    messages.push({ role: 'assistant', content: fullContent });

    // Update usage
    state.usageCount = (state.usageCount || 0) + 1;
    saveState(state);
    updateUsageDisplay();
    setStatus('ok', '就绪');

  } catch (err) {
    contentEl.classList.remove('streaming-cursor');
    const errMsg = err.message || '未知错误';
    contentEl.innerHTML = marked.parse('> ⚠️ **' + escapeHtml(errMsg) + '**\n\n> 点击重试或检查 API Key 设置');
    if (errMsg.includes('401') || errMsg.includes('Authentication')) {
      addSystemMsg('🔑 API Key 无效，请重新设置（点击 ⚙️）');
    }
    setStatus('error', '出错');
  } finally {
    sendBtn.disabled = false;
    inputEl.disabled = false;
    isStreaming = false;
    inputEl.focus();
    saveMessages();
  }
}

// ==================== 消息管理 ====================
function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = '<span class="message-avatar">ℹ️</span>' +
    '<div class="message-content" style="font-size:13px;color:var(--text-secondary)">' + text + '</div>';
  chatEl.appendChild(div);
  scrollToBottom();
}

function saveMessages() {
  try {
    localStorage.setItem('zhangxuefeng-messages', JSON.stringify(messages.slice(-50)));
  } catch {}
}

function loadMessages() {
  try {
    const raw = localStorage.getItem('zhangxuefeng-messages');
    if (raw) {
      const arr = JSON.parse(raw);
      arr.forEach(m => {
        renderMessage(m.role, m.content);
      });
      messages = arr;
    }
  } catch {}
}

// ==================== 发送消息 ====================
async function sendMessage() {
  if (isStreaming) return;
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  renderMessage('user', text);
  await callDeepSeek(text);
}

// ==================== 快速提问 ====================
function askQuick(text) {
  inputEl.value = text;
  sendMessage();
}

// ==================== 键盘事件 ====================
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ==================== 输入框自适应高度 ====================
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ==================== 状态指示器 ====================
function setStatus(status, text) {
  statusDot.className = 'status-dot ' + status;
  statusText.textContent = text;
}

function updateUsageDisplay() {
  usageDisplay.textContent = '使用 ' + (state.usageCount || 0) + ' 次';
}

// ==================== 设置面板 ====================
function openSettings() {
  document.getElementById('apiKeyInput').value = state.apiKey || '';
  document.getElementById('modelSelect').value = state.model;
  document.getElementById('tempRange').value = state.temperature;
  document.getElementById('tempValue').textContent = state.temperature;
  settingsModal.classList.add('active');
}

function closeSettings() {
  settingsModal.classList.remove('active');
}

function saveSettings() {
  state.apiKey = document.getElementById('apiKeyInput').value.trim();
  state.model = document.getElementById('modelSelect').value;
  state.temperature = parseFloat(document.getElementById('tempRange').value);
  saveState(state);
  closeSettings();
  setStatus('ok', '已保存');
  if (state.apiKey) {
    addSystemMsg('✅ 设置已保存，API Key 就绪。有啥问题尽管问！');
  }
}

function resetAll() {
  if (!confirm('确定要清空所有对话记录和设置吗？此操作不可撤销！')) return;
  messages = [];
  state = { ...DEFAULTS };
  saveState(state);
  localStorage.removeItem('zhangxuefeng-messages');
  chatEl.innerHTML = '';
  chatEl.appendChild(welcomeEl);
  showWelcome();
  closeSettings();
  updateUsageDisplay();
  setStatus('ok', '已重置');
}

// ==================== 主题切换 ====================
document.getElementById('themeBtn').addEventListener('click', () => {
  state.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
  document.body.dataset.theme = state.theme;
  saveState(state);
});

// ==================== 按钮事件 ====================
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('确定清空当前对话？')) return;
  messages = [];
  localStorage.removeItem('zhangxuefeng-messages');
  chatEl.innerHTML = '';
  const w = document.createElement('div');
  w.className = 'welcome';
  w.id = 'welcome';
  w.innerHTML = welcomeEl ? welcomeEl.innerHTML : '';
  chatEl.appendChild(w);
  if (w.querySelector('.quick-asks')) {
    w.querySelectorAll('.quick-ask').forEach(b => {
      b.onclick = function() { askQuick(this.textContent); };
    });
  }
  showWelcome();
});

// 点击遮罩关闭设置
settingsModal.addEventListener('click', (e) => {
  if (e.target === settingsModal) closeSettings();
});

// ==================== 初始化 ====================
function init() {
  updateUsageDisplay();
  loadMessages();
  if (messages.length > 0) hideWelcome();

  // API Key 已内置，直接可用
  if (state.apiKey) {
    setStatus('ok', 'API 就绪');
  }
}

init();
</script>
</body>
</html>
